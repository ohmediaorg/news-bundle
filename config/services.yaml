services:
  # default configuration for services in *this* file
  _defaults:
    autowire: true # Automatically injects dependencies in your services.
    autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

  OHMedia\NewsBundle\Twig\ArticleSchemaExtension:
        tags: ["twig.extension"]

  OHMedia\NewsBundle\Twig\ArticleRssExtension:
        tags: ["twig.extension"]

  # makes classes in src/ available to be used as services
  # this creates a service per class whose id is the fully-qualified class name
  OHMedia\NewsBundle\:
    resource: '../src/'
    exclude:
      - '../src/Entity/'
      - '../src/OHMediaNewsBundle.php'
    bind:
      $routePrefix: '%oh_media_news.parent_path%'
      $paginationLimit: '%oh_media_news.pagination_limit%'

  OHMedia\NewsBundle\Security\Voter\ArticleTagVoter:
    arguments:
      $enabledArticleTags: '%oh_media_news.article_tags%'
